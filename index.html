<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<title>DocLib IFC Metadata</title>

<script src="https://components.connect.trimble.com/trimble-connect-workspace-api/index.js"></script>

<style>
body { font-family: Arial; margin:0; padding:20px; }
table { width:100%; border-collapse: collapse; }
th,td { padding:8px; border-bottom:1px solid #ccc; }
</style>
</head>

<body>

<h3>IFC Metadata</h3>

<div id="status">Starter...</div>

<table>
<thead>
<tr>
<th>Fil</th>
<th>Mappe</th>
<th>Fag</th>
<th>MMI</th>
<th>Revisjon</th>
<th>Dato</th>
<th>Gjelder</th>
</tr>
</thead>
<tbody id="tableBody">
<tr><td colspan="7">Laster...</td></tr>
</tbody>
</table>

<script>

// GLOBAL ERROR LOGGER
window.onerror = function(msg, url, line, col, error) {
    console.error("GLOBAL ERROR:", msg, error);
};

let API = null;
let accessToken = null;
let projectId = null;
let allFilesData = [];

const baseUrl = "https://app21.connect.trimble.com";

function setStatus(msg) {
    document.getElementById("status").innerText = msg;
}

// ✅ INIT (STABIL)
window.onload = async function init() {

    try {
        setStatus("Kobler...");

        API = await window.TrimbleConnectWorkspace.connect(window.parent);

        // ✅ KRITISK: registrer extension i UI
        try {
            await API.ui.setMenu({
                title: "DocLib",
                command: "open"
            });
        } catch(e) { console.warn(e); }

        API.ui.onCommand(cmd => {
            if (cmd === "open") {
                API.ui.setActiveMenuItem("open").catch(()=>{});
            }
        });

        const project = await API.project.getProject();
        projectId = project.id;

        // ✅ token
        try {
            const tokenData = await API.extension.getPermission("accesstoken");
            accessToken = typeof tokenData === 'string'
                ? tokenData
                : (tokenData?.accessToken || "");
        } catch(e) {
            console.warn("Token-feil", e);
        }

        if (!accessToken) throw new Error("Manglende token");

        fetchFiles();

    } catch (e) {
        console.error(e);
        setStatus("Init-feil");
    }
};


// ✅ HENT IFC-FILER
async function fetchFiles() {

    try {
        setStatus("Henter prosjekt...");

        const res = await fetch(`${baseUrl}/tc/api/2.0/projects/${projectId}`, {
            headers:{ Authorization:`Bearer ${accessToken}` }
        });

        const data = await res.json();
        const rootId = data.rootId;

        setStatus("Skanner mapper...");

        const files = await walkFolders(rootId, "Rot");

        setStatus(`Fant ${files.length} IFC filer`);

        // ✅ Throttling
        allFilesData = await mapWithLimit(files, 4, async f => {
            const meta = await getMetadata(f.id, f.name);
            return { ...f, ...meta };
        });

        render(allFilesData);

        setStatus("Ferdig ✅");

    } catch(e) {
        console.error(e);
        setStatus("Feil ved henting");
    }
}


// ✅ REKURSIV MAPPELESING
async function walkFolders(folderId, name) {

    let result = [];

    try {
        const res = await fetch(`${baseUrl}/tc/api/2.0/folders/${folderId}/items`, {
            headers:{ Authorization:`Bearer ${accessToken}` }
        });

        const data = await res.json();
        const items = data.items || data;

        for (const i of items) {

            if (i.type === "FILE" && i.name.toLowerCase().endsWith(".ifc")) {
                result.push({ id:i.id, name:i.name, folder:name });
            }

            if (i.type === "FOLDER") {
                const sub = await walkFolders(i.id, i.name);
                result = result.concat(sub);
            }
        }

    } catch(e) {
        console.warn("Mappefeil", e);
    }

    return result;
}


// ✅ IFC METADATA
async function getMetadata(fileId, fileName) {

    const empty = {
        fag:"-",
        mmi:"-",
        revisjon:"-",
        dato:"-",
        gjelder:"-"
    };

    try {

        // 1️⃣ file -> model
        const f = await fetch(`${baseUrl}/tc/api/2.0/files/${fileId}`, {
            headers:{ Authorization:`Bearer ${accessToken}` }
        });

        if (!f.ok) return empty;

        const fileData = await f.json();
        const modelId = fileData.modelId || fileData.id;

        // 2️⃣ hent IFC props
        const p = await fetch(`${baseUrl}/tc/api/2.0/models/${modelId}/properties`, {
            headers:{ Authorization:`Bearer ${accessToken}` }
        });

        if (!p.ok) {
            console.warn("Ingen props:", fileName);
            return empty;
        }

        const props = await p.json();

        console.log("PROPS:", fileName, props);

        return {
            fag: extract(props, ["Fag"]),
            mmi: extract(props, ["MMI"]),
            revisjon: extract(props, ["Revisjon"]),
            dato: extract(props, ["Revisjonsdato"]),
            gjelder: extract(props, ["Gjelder","Beskrivelse"])
        };

    } catch(e) {
        console.warn("Metadata-feil", fileName, e);
        return empty;
    }
}


// ✅ PROPERTY PARSER
function extract(data, keys) {

    if (!data) return "-";

    // direkte objekt
    for (const k of keys) {
        if (data[k]) return data[k];
    }

    // array (vanlig IFC)
    if (Array.isArray(data)) {
        for (const set of data) {
            if (!set.properties) continue;

            for (const k of keys) {
                if (set.properties[k]) return set.properties[k];
            }
        }
    }

    return "-";
}


// ✅ THROTTLING
async function mapWithLimit(arr, limit, fn) {

    const ret = [];
    const executing = [];

    for (const item of arr) {

        const p = Promise.resolve().then(() => fn(item));
        ret.push(p);

        if (limit <= arr.length) {
            const e = p.then(() => executing.splice(executing.indexOf(e),1));
            executing.push(e);

            if (executing.length >= limit) {
                await Promise.race(executing);
            }
        }
    }

    return Promise.all(ret);
}


// ✅ RENDER
function render(data) {

    const tbody = document.getElementById("tableBody");

    if (!data.length) {
        tbody.innerHTML = "<tr><td colspan='7'>Ingen data</td></tr>";
        return;
    }

    tbody.innerHTML = data.map(f => `
        <tr>
        <td>${f.name}</td>
        <td>${f.folder}</td>
        <td>${f.fag}</td>
        <td>${f.mmi}</td>
        <td>${f.revisjon}</td>
        <td>${f.dato}</td>
        <td>${f.gjelder}</td>
        </tr>
    `).join("");
}

</script>

</body>
</html>
