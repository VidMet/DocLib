<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DocLib</title>

<script src="https://components.connect.trimble.com/trimble-connect-workspace-api/index.js"></script>

<style>
/* ==== DIN ORIGINAL STYLING (URØRT) ==== */
body { font-family: Arial; margin:0; background:#f3f4f6; }

.header {
    background:white;
    padding:15px;
    border-bottom:1px solid #ccc;
}

.main { padding:20px; }

table { width:100%; border-collapse: collapse; background:white; }
th, td { padding:10px; border-bottom:1px solid #ddd; text-align:left; }

.status { font-size:12px; color:#666; }
</style>
</head>

<body>

<div class="header">
    <h3>DocLib</h3>
    <div id="status" class="status">Starter...</div>
</div>

<div class="main">

<input type="text" id="searchInput" placeholder="Søk..." style="margin-bottom:10px; padding:5px; width:250px;">

<table>
<thead>
<tr>
<th>Filnavn</th>
<th>Mappe</th>
<th>Fag</th>
<th>MMI</th>
<th>Revisjon</th>
<th>Revisjonsdato</th>
<th>Gjelder</th>
</tr>
</thead>

<tbody id="tableBody">
<tr><td colspan="7">Laster...</td></tr>
</tbody>
</table>

</div>

<script>

// ✅ GLOBAL ERROR → extension forsvinner aldri
window.onerror = function(msg, url, line, col, error) {
    console.error("GLOBAL ERROR:", msg, error);
};

let API = null;
let accessToken = null;
let currentProject = null;
let allFilesData = [];

const baseUrl = "https://app21.connect.trimble.com";

function setStatus(msg) {
    document.getElementById("status").innerText = msg;
}


// ==============================
// ✅ INIT (STABIL)
// ==============================
window.onload = async function initExtension() {
    try {

        setStatus("Kobler til Trimble...");

        API = await window.TrimbleConnectWorkspace.connect(window.parent);

        // ✅ KRITISK – registrer extension
        try {
            await API.ui.setMenu({
                title: "DocLib",
                command: "open_doclib"
            });
        } catch(e) { console.warn(e); }

        try {
            API.ui.onCommand((cmd) => {
                if (cmd === "open_doclib") {
                    API.ui.setActiveMenuItem("open_doclib").catch(()=>{});
                }
            });
        } catch(e) { console.warn(e); }

        currentProject = await API.project.getProject();

        // ✅ token
        try {
            const tokenData = await API.extension.getPermission("accesstoken");
            accessToken = typeof tokenData === 'string'
                ? tokenData
                : (tokenData?.accessToken || "");
        } catch(e) {
            console.warn("Token-feil", e);
        }

        if (!accessToken) throw new Error("Ingen token");

        fetchProjectFiles(currentProject.id);

    } catch(e) {
        console.error(e);
        setStatus("Init-feil");
    }
};


// ==============================
// ✅ HENT FILER
// ==============================
async function fetchProjectFiles(projectId) {
    try {

        setStatus("Henter mapper...");

        const res = await fetch(`${baseUrl}/tc/api/2.0/projects/${projectId}`, {
            headers:{ Authorization:`Bearer ${accessToken}` }
        });

        const project = await res.json();
        const rootId = project.rootId;

        const files = await getIfcFiles(rootId, "Rotmappe");

        setStatus(`Fant ${files.length} IFC-filer`);

        allFilesData = await mapWithLimit(files, 4, async file => {
            const meta = await fetchFileMetadata(file.id, file.name);
            return { ...file, ...meta };
        });

        render(allFilesData);
        setupSearch();

        setStatus("Ferdig");

    } catch(e) {
        console.error(e);
        setStatus("Feil");
    }
}


// ==============================
// ✅ REKURSIV HENTING
// ==============================
async function getIfcFiles(folderId, folderName) {

    let result = [];

    try {
        const res = await fetch(`${baseUrl}/tc/api/2.0/folders/${folderId}/items`, {
            headers:{ Authorization:`Bearer ${accessToken}` }
        });

        const data = await res.json();
        const items = data.items || data;

        for (const item of items) {

            if (item.type === "FILE" && item.name.toLowerCase().endsWith(".ifc")) {
                result.push({
                    id:item.id,
                    name:item.name,
                    folderName:folderName
                });
            }

            if (item.type === "FOLDER") {
                const sub = await getIfcFiles(item.id, item.name);
                result = result.concat(sub);
            }
        }

    } catch(e) {
        console.warn("Mappefeil", e);
    }

    return result;
}


// ==============================
// ✅ METADATA (FAILSAFE)
// ==============================
async function fetchFileMetadata(fileId, fileName) {

    const empty = {
        fag:"-",
        mmi:"-",
        revisjon:"-",
        revisjonsdato:"-",
        gjelder:"-"
    };

    try {

        // file → modelId
        let fileData;
        try {
            const res = await fetch(`${baseUrl}/tc/api/2.0/files/${fileId}`, {
                headers:{ Authorization:`Bearer ${accessToken}` }
            });

            if (!res.ok) return empty;

            fileData = await res.json();

        } catch(e) {
            return empty;
        }

        const modelId = fileData?.modelId;

        if (!modelId) return empty;

        // IFC properties
        let propData;
        try {

            const res = await fetch(`${baseUrl}/tc/api/2.0/models/${modelId}/properties`, {
                headers:{ Authorization:`Bearer ${accessToken}` }
            });

            if (!res.ok) return empty;

            propData = await res.json();

        } catch(e) {
            return empty;
        }

        console.log("IFC:", fileName, propData);

        return {
            fag: safeExtract(propData, ["Fag"]),
            mmi: safeExtract(propData, ["MMI"]),
            revisjon: safeExtract(propData, ["Revisjon"]),
            revisjonsdato: safeExtract(propData, ["Revisjonsdato"]),
            gjelder: safeExtract(propData, ["Gjelder","Beskrivelse"])
        };

    } catch(e) {
        return empty;
    }
}


// ==============================
// ✅ SAFE EXTRACT
// ==============================
function safeExtract(data, keys) {

    try {

        if (!data) return "-";

        for (const k of keys) {
            if (data[k]) return data[k];
        }

        if (Array.isArray(data)) {
            for (const set of data) {
                if (!set || !set.properties) continue;

                for (const k of keys) {
                    if (set.properties[k]) return set.properties[k];
                }
            }
        }

        return "-";

    } catch(e) {
        return "-";
    }
}


// ==============================
// ✅ THROTTLING
// ==============================
async function mapWithLimit(arr, limit, fn) {

    const ret = [];
    const executing = [];

    for (const item of arr) {

        const p = Promise.resolve().then(() => fn(item));
        ret.push(p);

        if (limit <= arr.length) {

            const e = p.then(() => executing.splice(executing.indexOf(e),1));
            executing.push(e);

            if (executing.length >= limit) {
                await Promise.race(executing);
            }
        }
    }

    return Promise.all(ret);
}


// ==============================
// ✅ RENDER
// ==============================
function render(data) {

    const tbody = document.getElementById("tableBody");

    if (!data.length) {
        tbody.innerHTML = "<tr><td colspan='7'>Ingen data</td></tr>";
        return;
    }

    tbody.innerHTML = data.map(f => `
        <tr>
        <td>${f.name}</td>
        <td>${f.folderName}</td>
        <td>${f.fag}</td>
        <td>${f.mmi}</td>
        <td>${f.revisjon}</td>
        <td>${f.revisjonsdato}</td>
        <td>${f.gjelder}</td>
        </tr>
    `).join("");
}


// ==============================
// ✅ SEARCH
// ==============================
function setupSearch() {

    const input = document.getElementById("searchInput");

    input.addEventListener("input", () => {

        const term = input.value.toLowerCase();

        const filtered = allFilesData.filter(f =>
            Object.values(f).some(val =>
                String(val).toLowerCase().includes(term)
            )
        );

        render(filtered);
    });
}

</script>

</body>
</html>
